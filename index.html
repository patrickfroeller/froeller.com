<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>froeller.com</title>
  <meta name="description" content="Minimale Startseite mit zentriertem, interaktiv drehbarem Logo.">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --page-bg: #efefef;
      --page-text: #111111;
      --logo-color: #ffffff;
      --logo-size: clamp(180px, 25vmin, 320px);
      --footer-font: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      color: var(--page-text);
    }

    .logo-stage {
      width: var(--logo-size);
      height: var(--logo-size);
      display: grid;
      place-items: center;
      transform: translateZ(0);
    }

    .logo-stage.is-hover-target {
      cursor: grab;
    }

    .logo-stage.is-dragging {
      cursor: grabbing;
    }

    .logo {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      pointer-events: none;
      will-change: transform;
      opacity: 0;
      animation: logoFadeIn 2200ms cubic-bezier(0.22, 1, 0.36, 1) 180ms forwards;
      background: var(--logo-color);
      -webkit-mask-image: url('logo.svg');
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      mask-image: url('logo.svg');
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
    }


    .site-footer {
      position: fixed;
      left: 50%;
      bottom: clamp(12px, 2.2vmin, 24px);
      transform: translateX(-50%);
      margin: 0;
      color: var(--logo-color);
      font-family: var(--footer-font);
      font-size: clamp(0.82rem, 1.4vmin, 1rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.2;
      opacity: 0.92;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes logoFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo {
        transition: transform 0.01ms linear;
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="logo-stage" id="logoStage" aria-label="Interaktives Logo">
    <div class="logo" id="logo" role="img" aria-label="froeller.com Logo"></div>
  </main>
  <p class="site-footer">© <span id="copyrightYear"></span> Patrick Fröller. All rights reserved.</p>

  <script>
    (() => {
      function srgbToLinear(value) {
        const normalized = value / 255;
        return normalized <= 0.04045
          ? normalized / 12.92
          : Math.pow((normalized + 0.055) / 1.055, 2.4);
      }

      function getRelativeLuminance({ r, g, b }) {
        const red = srgbToLinear(r);
        const green = srgbToLinear(g);
        const blue = srgbToLinear(b);
        return red * 0.2126 + green * 0.7152 + blue * 0.0722;
      }

      function getContrastRatio(lighter, darker) {
        return (lighter + 0.05) / (darker + 0.05);
      }

      function randomRgbColor() {
        return {
          r: Math.floor(Math.random() * 256),
          g: Math.floor(Math.random() * 256),
          b: Math.floor(Math.random() * 256)
        };
      }

      function rgbToHsl({ r, g, b }) {
        const red = r / 255;
        const green = g / 255;
        const blue = b / 255;
        const max = Math.max(red, green, blue);
        const min = Math.min(red, green, blue);
        const delta = max - min;

        let hue = 0;
        if (delta !== 0) {
          if (max === red) {
            hue = ((green - blue) / delta) % 6;
          } else if (max === green) {
            hue = (blue - red) / delta + 2;
          } else {
            hue = (red - green) / delta + 4;
          }
        }

        const lightness = (max + min) / 2;
        const saturation = delta === 0
          ? 0
          : delta / (1 - Math.abs(2 * lightness - 1));

        return {
          h: ((hue * 60) + 360) % 360,
          s: saturation * 100,
          l: lightness * 100
        };
      }

      function hslToRgb({ h, s, l }) {
        const saturation = s / 100;
        const lightness = l / 100;
        const chroma = (1 - Math.abs(2 * lightness - 1)) * saturation;
        const hueSection = h / 60;
        const x = chroma * (1 - Math.abs((hueSection % 2) - 1));

        let red = 0;
        let green = 0;
        let blue = 0;

        if (hueSection >= 0 && hueSection < 1) {
          red = chroma; green = x; blue = 0;
        } else if (hueSection >= 1 && hueSection < 2) {
          red = x; green = chroma; blue = 0;
        } else if (hueSection >= 2 && hueSection < 3) {
          red = 0; green = chroma; blue = x;
        } else if (hueSection >= 3 && hueSection < 4) {
          red = 0; green = x; blue = chroma;
        } else if (hueSection >= 4 && hueSection < 5) {
          red = x; green = 0; blue = chroma;
        } else {
          red = chroma; green = 0; blue = x;
        }

        const match = lightness - chroma / 2;
        return {
          r: Math.round((red + match) * 255),
          g: Math.round((green + match) * 255),
          b: Math.round((blue + match) * 255)
        };
      }

      function getContrastFromRgb(colorA, colorB) {
        const lumA = getRelativeLuminance(colorA);
        const lumB = getRelativeLuminance(colorB);
        return getContrastRatio(Math.max(lumA, lumB), Math.min(lumA, lumB));
      }

      function pickLogoColorForBackground(background) {
        const backgroundHsl = rgbToHsl(background);
        const isBgLight = getRelativeLuminance(background) > 0.45;
        const hueOffsets = [30, 60, 90, 120, 150, 180, 210, 240, 300, 330];
        const saturationOptions = [95, 100];
        const lightnessOptions = isBgLight
          ? [22, 28, 34, 40, 46]
          : [56, 62, 68, 74];

        const candidates = [];
        for (const offset of hueOffsets) {
          for (const saturation of saturationOptions) {
            for (const lightness of lightnessOptions) {
              const hue = (backgroundHsl.h + offset + Math.random() * 24 - 12 + 360) % 360;
              const candidateHsl = { h: hue, s: saturation, l: lightness };
              const candidateRgb = hslToRgb(candidateHsl);
              candidates.push({
                css: `hsl(${Math.round(candidateHsl.h)} ${candidateHsl.s}% ${candidateHsl.l}%)`,
                contrast: getContrastFromRgb(background, candidateRgb),
                vividness: candidateHsl.s * (100 - Math.abs(candidateHsl.l - 50))
              });
            }
          }
        }

        candidates.sort((a, b) => {
          if (b.contrast !== a.contrast) {
            return b.contrast - a.contrast;
          }
          return b.vividness - a.vividness;
        });

        const strongVividMatches = candidates.filter((entry) => entry.contrast >= 3.5);
        if (strongVividMatches.length > 0) {
          return strongVividMatches[Math.floor(Math.random() * strongVividMatches.length)].css;
        }

        const fallbackVividMatches = candidates.filter((entry) => entry.contrast >= 3);
        if (fallbackVividMatches.length > 0) {
          return fallbackVividMatches[Math.floor(Math.random() * fallbackVividMatches.length)].css;
        }

        return getContrastFromRgb(background, { r: 255, g: 255, b: 255 }) >= 4.5
          ? '#ffffff'
          : '#000000';
      }

      function applyAccessibleRandomBackground() {
        const background = randomRgbColor();
        const bgLuminance = getRelativeLuminance(background);

        const blackLuminance = 0;
        const whiteLuminance = 1;
        const contrastWithBlack = getContrastRatio(
          Math.max(bgLuminance, blackLuminance),
          Math.min(bgLuminance, blackLuminance)
        );
        const contrastWithWhite = getContrastRatio(
          Math.max(bgLuminance, whiteLuminance),
          Math.min(bgLuminance, whiteLuminance)
        );

        const textColor = contrastWithBlack >= contrastWithWhite ? '#000000' : '#ffffff';
        const bgCss = `rgb(${background.r} ${background.g} ${background.b})`;

        document.documentElement.style.setProperty('--page-bg', bgCss);
        document.documentElement.style.setProperty('--page-text', textColor);
        document.documentElement.style.setProperty('--logo-color', pickLogoColorForBackground(background));
      }

      applyAccessibleRandomBackground();

      const yearNode = document.getElementById('copyrightYear');
      if (yearNode) {
        yearNode.textContent = String(new Date().getFullYear());
      }

      const stage = document.getElementById('logoStage');
      const logo = document.getElementById('logo');

      const state = {
        rotation: 0,
        velocity: 0,
        isDragging: false,
        lastPointerAngle: 0,
        lastPointerTime: 0,
        animationId: 0,
        returnAnimationId: 0
      };

      const physics = {
        damping: 0.95,
        stopThreshold: 0.01,
        maxVelocity: 8,
        dragSmoothing: 0.35
      };

      function isInsideLogoCircle(event) {
        const center = getCenter();
        const radius = stage.clientWidth / 2;
        const dx = event.clientX - center.x;
        const dy = event.clientY - center.y;
        return Math.hypot(dx, dy) <= radius;
      }

      function getCenter() {
        const rect = stage.getBoundingClientRect();
        return {
          x: rect.left + rect.width / 2,
          y: rect.top + rect.height / 2
        };
      }

      function getPointerAngle(event) {
        const center = getCenter();
        const dx = event.clientX - center.x;
        const dy = event.clientY - center.y;
        return Math.atan2(dy, dx);
      }

      function normalizeDeltaAngle(delta) {
        if (delta > Math.PI) {
          return delta - Math.PI * 2;
        }
        if (delta < -Math.PI) {
          return delta + Math.PI * 2;
        }
        return delta;
      }

      function render() {
        logo.style.transform = `rotate(${state.rotation}deg)`;
      }

      function normalizeTo180(angle) {
        let normalized = angle % 360;
        if (normalized > 180) {
          normalized -= 360;
        }
        if (normalized < -180) {
          normalized += 360;
        }
        return normalized;
      }

      function animateBackToBase() {
        cancelAnimationFrame(state.returnAnimationId);

        const reducedMotionEnabled = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reducedMotionEnabled) {
          state.rotation = 0;
          render();
          return;
        }

        const startRotation = state.rotation;
        const offsetToBase = normalizeTo180(startRotation);
        const targetRotation = startRotation - offsetToBase;
        const durationMs = 520;
        const startTime = performance.now();

        const step = (now) => {
          if (state.isDragging) {
            return;
          }

          const t = Math.min((now - startTime) / durationMs, 1);
          const eased = 1 - Math.pow(1 - t, 3);

          state.rotation = startRotation + (targetRotation - startRotation) * eased;
          render();

          if (t < 1) {
            state.returnAnimationId = requestAnimationFrame(step);
            return;
          }

          state.rotation = 0;
          render();
        };

        state.returnAnimationId = requestAnimationFrame(step);
      }

      function beginInertia() {
        cancelAnimationFrame(state.animationId);
        cancelAnimationFrame(state.returnAnimationId);

        const step = () => {
          if (state.isDragging) {
            return;
          }

          state.rotation += state.velocity;
          state.velocity *= physics.damping;

          if (Math.abs(state.velocity) < physics.stopThreshold) {
            state.velocity = 0;
            render();
            animateBackToBase();
            return;
          }

          render();
          state.animationId = requestAnimationFrame(step);
        };

        state.animationId = requestAnimationFrame(step);
      }

      function onPointerDown(event) {
        if (!isInsideLogoCircle(event)) {
          return;
        }

        event.preventDefault();
        stage.classList.add('is-dragging');
        state.isDragging = true;
        state.lastPointerAngle = getPointerAngle(event);
        state.lastPointerTime = performance.now();
        cancelAnimationFrame(state.animationId);
        cancelAnimationFrame(state.returnAnimationId);
        stage.setPointerCapture(event.pointerId);
      }

      function onPointerMove(event) {
        if (!state.isDragging) {
          stage.classList.toggle('is-hover-target', isInsideLogoCircle(event));
        }

        if (!state.isDragging) {
          return;
        }

        const currentAngle = getPointerAngle(event);
        const deltaAngle = normalizeDeltaAngle(currentAngle - state.lastPointerAngle);
        const deltaDegrees = deltaAngle * (180 / Math.PI);

        state.rotation += deltaDegrees;

        const now = performance.now();
        const deltaTime = Math.max(now - state.lastPointerTime, 1);
        const rawVelocity = (deltaDegrees / deltaTime) * 16.67;
        const clampedVelocity = Math.max(-physics.maxVelocity, Math.min(physics.maxVelocity, rawVelocity));

        state.velocity += (clampedVelocity - state.velocity) * physics.dragSmoothing;

        state.lastPointerAngle = currentAngle;
        state.lastPointerTime = now;
        render();
      }

      function onPointerUp(event) {
        if (!state.isDragging) {
          return;
        }

        state.isDragging = false;
        stage.classList.remove('is-dragging');
        stage.classList.toggle('is-hover-target', isInsideLogoCircle(event));
        stage.releasePointerCapture(event.pointerId);
        beginInertia();
      }

      stage.addEventListener('pointerdown', onPointerDown);
      stage.addEventListener('pointermove', onPointerMove);
      stage.addEventListener('pointerup', onPointerUp);
      stage.addEventListener('pointercancel', onPointerUp);
      stage.addEventListener('pointerleave', () => {
        if (!state.isDragging) {
          stage.classList.remove('is-hover-target');
        }
      });

      render();
    })();
  </script>
</body>
</html>
