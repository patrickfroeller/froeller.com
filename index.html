<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>froeller.com</title>
<style>
  body {
    margin: 0;
    background: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow-x: hidden;
    height: 200vh;
  }

  .logo-wrapper {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .logo-rotator {
    touch-action: none;
    -webkit-touch-callout: none;
    cursor: grab;
    user-select: none;
  }

  .logo-rotator.is-dragging {
    cursor: grabbing;
  }

  .logo {
    width: 120px;
    animation: zoomIn 4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    filter: blur(10px) brightness(1.2);
    opacity: 0;
    display: block;
    -webkit-user-drag: none;
  }

  @keyframes zoomIn {
    0% {
      transform: scale(0.6);
      opacity: 0;
      filter: blur(20px);
    }
    40% {
      opacity: 1;
    }
    100% {
      transform: scale(2.2);
      opacity: 1;
      filter: blur(0px);
    }
  }

  .headline {
    position: fixed;
    bottom: 25%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 26px;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .sub {
    font-size: 14px;
    opacity: 0.5;
    margin-top: 8px;
  }

  .hint {
    position: fixed;
    bottom: 5%;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="logo-wrapper">
  <div class="logo-rotator" id="logoRotator" aria-label="Rotate logo">
    <img src="logo.png" class="logo" id="logo" alt="Logo">
  </div>
</div>

<div class="headline" id="text">
  
  <div class="sub"></div>
</div>

<div class="hint"></div>

<script>
  // smooth Apple-like reveal on scroll
  window.addEventListener("scroll", () => {
    const text = document.getElementById("text");
    const progress = Math.min(window.scrollY / 300, 1);
    text.style.opacity = progress;
  });

  // rotate logo like a phone dial by grabbing near the edge
  const rotator = document.getElementById("logoRotator");
  let isDragging = false;
  let dragOffset = 0;
  let currentRotation = 0;

  const getPoint = (event) => {
    if (event.touches && event.touches[0]) return event.touches[0];
    if (event.changedTouches && event.changedTouches[0]) return event.changedTouches[0];
    return event;
  };

  const getAngleToCenter = (event) => {
    const point = getPoint(event);
    const rect = rotator.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = point.clientX - cx;
    const dy = point.clientY - cy;
    return {
      angle: Math.atan2(dy, dx) * (180 / Math.PI),
      distance: Math.hypot(dx, dy),
      radius: Math.min(rect.width, rect.height) / 2
    };
  };

  const applyRotation = (angle) => {
    currentRotation = angle;
    rotator.style.transform = `rotate(${currentRotation}deg)`;
  };

  const startDragging = (event) => {
    const { angle, distance, radius } = getAngleToCenter(event);
    const edgeThreshold = radius * 0.62;

    if (distance < edgeThreshold) return;

    isDragging = true;
    dragOffset = angle - currentRotation;
    rotator.classList.add("is-dragging");

    if (event.pointerId !== undefined && rotator.setPointerCapture) {
      rotator.setPointerCapture(event.pointerId);
    }
    event.preventDefault();
  };

  const drag = (event) => {
    if (!isDragging) return;
    const { angle } = getAngleToCenter(event);
    applyRotation(angle - dragOffset);
    event.preventDefault();
  };

  const stopDragging = (event) => {
    if (!isDragging) return;
    isDragging = false;
    rotator.classList.remove("is-dragging");
    if (event.pointerId !== undefined && rotator.hasPointerCapture && rotator.hasPointerCapture(event.pointerId)) {
      rotator.releasePointerCapture(event.pointerId);
    }
  };

  rotator.addEventListener("pointerdown", startDragging);
  rotator.addEventListener("pointermove", drag);
  rotator.addEventListener("pointerup", stopDragging);
  rotator.addEventListener("pointercancel", stopDragging);

  rotator.addEventListener("touchstart", startDragging, { passive: false });
  rotator.addEventListener("touchmove", drag, { passive: false });
  rotator.addEventListener("touchend", stopDragging);
  rotator.addEventListener("touchcancel", stopDragging);
</script>

</body>
</html>
