<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>froeller.com</title>
  <meta name="description" content="Minimale Startseite mit zentriertem, interaktiv drehbarem Logo.">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --page-bg: #efefef;
      --page-text: #111111;
      --logo-color: #ffffff;
      --logo-size: clamp(180px, 25vmin, 320px);
      --footer-font: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      color: var(--page-text);
      font-family: var(--footer-font);
    }

    .logo-stage {
      width: var(--logo-size);
      height: var(--logo-size);
      display: grid;
      place-items: center;
      transform: translateZ(0);
    }

    .logo-stage.is-hover-target { cursor: grab; }
    .logo-stage.is-dragging { cursor: grabbing; }

    .logo {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      pointer-events: none;
      will-change: transform;
      opacity: 0;
      animation: logoFadeIn 2200ms cubic-bezier(0.22, 1, 0.36, 1) 180ms forwards;
      background: var(--logo-color);
      -webkit-mask-image: url('logo.svg');
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      mask-image: url('logo.svg');
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
    }

    .login-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, calc(-50% + min(36vmin, 190px)));
      display: grid;
      gap: 10px;
      width: min(90vw, 360px);
      touch-action: auto;
      -webkit-user-select: text;
      user-select: text;
      pointer-events: auto;
      z-index: 2;
    }

    .login-row {
      display: flex;
      gap: 8px;
    }

    .ui-btn,
    .password-input {
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--logo-color) 70%, transparent);
      background: color-mix(in srgb, var(--logo-color) 20%, transparent);
      color: var(--page-text);
      font-size: 0.95rem;
      line-height: 1.2;
    }

    .ui-btn {
      padding: 9px 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    .password-input {
      flex: 1;
      padding: 9px 12px;
      min-width: 0;
      outline: none;
    }

    .password-input::placeholder { color: color-mix(in srgb, var(--page-text) 70%, transparent); }
    .error-msg { margin: 0; min-height: 1.1em; font-size: 0.8rem; opacity: 0.95; }
    .hidden { display: none; }

    .site-footer {
      position: fixed;
      left: 50%;
      bottom: clamp(12px, 2.2vmin, 24px);
      transform: translateX(-50%);
      margin: 0;
      color: var(--logo-color);
      font-size: clamp(0.82rem, 1.4vmin, 1rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.2;
      opacity: 0.92;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes logoFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo { transition: transform 0.01ms linear; animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="logo-stage" id="logoStage" aria-label="Interaktives Logo">
    <div class="logo" id="logo" role="img" aria-label="froeller.com Logo"></div>
  </main>
  <p class="site-footer">© <span id="copyrightYear"></span> Patrick Fröller. All rights reserved.</p>

  <section class="login-panel" aria-label="Family board login">
    <button id="showLogin" class="ui-btn" type="button">Login</button>
    <form id="loginForm" class="login-row hidden" novalidate>
      <input id="passwordInput" class="password-input" type="password" autocomplete="current-password" placeholder="Password" required>
      <button class="ui-btn" type="submit">Go</button>
    </form>
    <p id="loginError" class="error-msg" aria-live="polite"></p>
  </section>

  <p class="site-footer">© <span id="copyrightYear"></span> Patrick Fröller. All rights reserved.</p>

  <script src="app.js"></script>
  <script>
    (() => {
      window.FroellerApp.applyAccessibleRandomBackground();

      const yearNode = document.getElementById('copyrightYear');
      if (yearNode) {
        yearNode.textContent = String(new Date().getFullYear());
      }

      const showLoginButton = document.getElementById('showLogin');
      const loginForm = document.getElementById('loginForm');
      const passwordInput = document.getElementById('passwordInput');
      const loginError = document.getElementById('loginError');

      showLoginButton.addEventListener('click', () => {
        showLoginButton.classList.add('hidden');
        loginForm.classList.remove('hidden');
        passwordInput.focus();
      });

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        loginError.textContent = '';

        const password = passwordInput.value.trim();
        if (!password) {
          loginError.textContent = 'Please enter a password.';
          return;
        }

        const hash = await window.FroellerApp.sha256Hex(password);
        if (hash !== window.FroellerApp.PASSWORD_HASH) {
          loginError.textContent = 'Wrong password.';
          return;
        }

        window.location.href = window.location.protocol === 'file:' ? 'board.html' : '/board.html';
      });

      const yearNode = document.getElementById('copyrightYear');
      if (yearNode) {
        yearNode.textContent = String(new Date().getFullYear());
      }

      const stage = document.getElementById('logoStage');
      const logo = document.getElementById('logo');

      const state = {
        rotation: 0,
        velocity: 0,
        isDragging: false,
        lastPointerAngle: 0,
        lastPointerTime: 0,
        animationId: 0,
        returnAnimationId: 0
      };

      const physics = {
        damping: 0.95,
        stopThreshold: 0.01,
        maxVelocity: 8,
        dragSmoothing: 0.35
      };

      function isInsideLogoCircle(event) {
        const center = getCenter();
        const radius = stage.clientWidth / 2;
        const dx = event.clientX - center.x;
        const dy = event.clientY - center.y;
        return Math.hypot(dx, dy) <= radius;
      }

      function getCenter() {
        const rect = stage.getBoundingClientRect();
        return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      }

      function getPointerAngle(event) {
        const center = getCenter();
        const dx = event.clientX - center.x;
        const dy = event.clientY - center.y;
        return Math.atan2(dy, dx);
      }

      function normalizeDeltaAngle(delta) {
        if (delta > Math.PI) return delta - Math.PI * 2;
        if (delta < -Math.PI) return delta + Math.PI * 2;
        return delta;
      }

      function render() {
        logo.style.transform = `rotate(${state.rotation}deg)`;
      }

      function normalizeTo180(angle) {
        let normalized = angle % 360;
        if (normalized > 180) normalized -= 360;
        if (normalized < -180) normalized += 360;
        return normalized;
      }

      function animateBackToBase() {
        cancelAnimationFrame(state.returnAnimationId);

        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          state.rotation = 0;
          render();
          return;
        }

        const startRotation = state.rotation;
        const offsetToBase = normalizeTo180(startRotation);
        const targetRotation = startRotation - offsetToBase;
        const durationMs = 520;
        const startTime = performance.now();

        const step = (now) => {
          if (state.isDragging) return;

          const t = Math.min((now - startTime) / durationMs, 1);
          const eased = 1 - Math.pow(1 - t, 3);

          state.rotation = startRotation + (targetRotation - startRotation) * eased;
          render();

          if (t < 1) {
            state.returnAnimationId = requestAnimationFrame(step);
            return;
          }

          state.rotation = 0;
          render();
        };

        state.returnAnimationId = requestAnimationFrame(step);
      }

      function beginInertia() {
        cancelAnimationFrame(state.animationId);
        cancelAnimationFrame(state.returnAnimationId);

        const step = () => {
          if (state.isDragging) return;

          state.rotation += state.velocity;
          state.velocity *= physics.damping;

          if (Math.abs(state.velocity) < physics.stopThreshold) {
            state.velocity = 0;
            render();
            animateBackToBase();
            return;
          }

          render();
          state.animationId = requestAnimationFrame(step);
        };

        state.animationId = requestAnimationFrame(step);
      }

      function onPointerDown(event) {
        if (!isInsideLogoCircle(event)) return;

        event.preventDefault();
        stage.classList.add('is-dragging');
        state.isDragging = true;
        state.lastPointerAngle = getPointerAngle(event);
        state.lastPointerTime = performance.now();
        cancelAnimationFrame(state.animationId);
        cancelAnimationFrame(state.returnAnimationId);
        stage.setPointerCapture(event.pointerId);
      }

      function onPointerMove(event) {
        if (!state.isDragging) {
          stage.classList.toggle('is-hover-target', isInsideLogoCircle(event));
        }

        if (!state.isDragging) return;

        const currentAngle = getPointerAngle(event);
        const deltaAngle = normalizeDeltaAngle(currentAngle - state.lastPointerAngle);
        const deltaDegrees = deltaAngle * (180 / Math.PI);

        state.rotation += deltaDegrees;

        const now = performance.now();
        const deltaTime = Math.max(now - state.lastPointerTime, 1);
        const rawVelocity = (deltaDegrees / deltaTime) * 16.67;
        const clampedVelocity = Math.max(-physics.maxVelocity, Math.min(physics.maxVelocity, rawVelocity));

        state.velocity += (clampedVelocity - state.velocity) * physics.dragSmoothing;

        state.lastPointerAngle = currentAngle;
        state.lastPointerTime = now;
        render();
      }

      function onPointerUp(event) {
        if (!state.isDragging) return;

        state.isDragging = false;
        stage.classList.remove('is-dragging');
        stage.classList.toggle('is-hover-target', isInsideLogoCircle(event));
        stage.releasePointerCapture(event.pointerId);
        beginInertia();
      }

      stage.addEventListener('pointerdown', onPointerDown);
      stage.addEventListener('pointermove', onPointerMove);
      stage.addEventListener('pointerup', onPointerUp);
      stage.addEventListener('pointercancel', onPointerUp);
      stage.addEventListener('pointerleave', () => {
        if (!state.isDragging) {
          stage.classList.remove('is-hover-target');
        }
      });

      render();
    })();
  </script>
</body>
</html>
