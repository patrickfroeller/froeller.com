<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>froeller.com</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <meta name="description" content="Animated entry screen with logo, wordmark, and login.">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="referrer" content="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #efefef;
      --page-text: #111111;
      --logo-color: #ffffff;
      --logo-size: clamp(104px, 12.4vmin, 156px);
      --gap: clamp(14px, 2.2vmin, 24px);
      --font-family: 'Quicksand', 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --move-left: -100px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      font-family: var(--font-family);
    }

    body {
      display: grid;
      place-items: center;
      color: var(--logo-color);
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(26px, 4.2vmin, 40px);
      width: min(90vw, 980px);
    }

    .brand-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--gap);
      transform: translateX(0);
      will-change: transform;
      animation: slideToLeft 2200ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    .logo {
      width: var(--logo-size);
      aspect-ratio: 1 / 1;
      background: var(--logo-color);
      opacity: 0;
      animation: logoFadeIn 2200ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
      -webkit-mask-image: url('logo.svg');
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      mask-image: url('logo.svg');
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
      flex: 0 0 auto;
      transform: rotate(var(--logo-rotation, 0deg));
      transform-origin: center;
      touch-action: none;
      user-select: none;
      cursor: grab;
      will-change: transform;
    }

    .logo.rotating { cursor: grabbing; }

    .wordmark {
      margin: 0;
      font-size: clamp(2.35rem, 5.6vmin, 5.2rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 0.9;
      color: var(--logo-color);
      white-space: nowrap;
      opacity: 0;
      animation: logoFadeIn 2200ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    .login-button {
      border: 1.5px solid transparent;
      border-radius: 999px;
      padding: 0.78rem 2rem;
      font: 700 clamp(0.96rem, 1.7vmin, 1.1rem) / 1 var(--font-family);
      letter-spacing: -0.01em;
      background: var(--logo-color);
      color: var(--page-bg);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.18);
      opacity: 0;
      transform: translateY(16px) scale(0.97);
      pointer-events: none;
      cursor: pointer;
      animation: buttonEnter 700ms cubic-bezier(0.16, 1, 0.3, 1) 4550ms forwards;
    }

    .site-footer {
      position: fixed;
      left: 50%;
      bottom: clamp(12px, 2.2vmin, 24px);
      transform: translateX(-50%);
      margin: 0;
      color: color-mix(in oklab, var(--logo-color) 78%, transparent);
      font-size: clamp(0.82rem, 1.4vmin, 1rem);
      letter-spacing: -0.01em;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes logoFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideToLeft { from { transform: translateX(0); } to { transform: translateX(var(--move-left)); } }

    @keyframes buttonEnter {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    }
    @media (max-width: 720px) {
      .wordmark { font-size: clamp(1.92rem, 11.8vw, 3.2rem); }
      .logo { width: clamp(80px, 25vw, 112px); }
      .brand-row { gap: clamp(10px, 3vw, 18px); }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Logo and entry">
    <div class="brand-row" id="brandRow">
      <div class="logo" role="img" aria-label="froeller.com Logo"></div>
      <h1 class="wordmark" id="wordmark" aria-label="froeller.com">froeller.com</h1>
    </div>
    <button class="login-button" id="loginButton" type="button">Login</button>
  </main>

  <p class="site-footer">© <span id="copyrightYear"></span> Patrick Fröller. All rights reserved.</p>

  <script>
    (() => {
      function srgbToLinear(value) {
        const normalized = value / 255;
        return normalized <= 0.04045 ? normalized / 12.92 : Math.pow((normalized + 0.055) / 1.055, 2.4);
      }

      function getRelativeLuminance({ r, g, b }) {
        return srgbToLinear(r) * 0.2126 + srgbToLinear(g) * 0.7152 + srgbToLinear(b) * 0.0722;
      }

      function getContrastRatio(lighter, darker) { return (lighter + 0.05) / (darker + 0.05); }
      function randomRgbColor() { return { r: Math.floor(Math.random() * 256), g: Math.floor(Math.random() * 256), b: Math.floor(Math.random() * 256) }; }

      function rgbToHsl({ r, g, b }) {
        const red = r / 255;
        const green = g / 255;
        const blue = b / 255;
        const max = Math.max(red, green, blue);
        const min = Math.min(red, green, blue);
        const delta = max - min;
        let hue = 0;
        if (delta !== 0) {
          if (max === red) hue = ((green - blue) / delta) % 6;
          else if (max === green) hue = (blue - red) / delta + 2;
          else hue = (red - green) / delta + 4;
        }
        const lightness = (max + min) / 2;
        const saturation = delta === 0 ? 0 : delta / (1 - Math.abs(2 * lightness - 1));
        return { h: ((hue * 60) + 360) % 360, s: saturation * 100, l: lightness * 100 };
      }

      function hslToRgb({ h, s, l }) {
        const saturation = s / 100;
        const lightness = l / 100;
        const chroma = (1 - Math.abs(2 * lightness - 1)) * saturation;
        const hueSection = h / 60;
        const x = chroma * (1 - Math.abs((hueSection % 2) - 1));
        let red = 0; let green = 0; let blue = 0;
        if (hueSection < 1) { red = chroma; green = x; }
        else if (hueSection < 2) { red = x; green = chroma; }
        else if (hueSection < 3) { green = chroma; blue = x; }
        else if (hueSection < 4) { green = x; blue = chroma; }
        else if (hueSection < 5) { red = x; blue = chroma; }
        else { red = chroma; blue = x; }
        const match = lightness - chroma / 2;
        return { r: Math.round((red + match) * 255), g: Math.round((green + match) * 255), b: Math.round((blue + match) * 255) };
      }

      function getContrastFromRgb(colorA, colorB) {
        const lumA = getRelativeLuminance(colorA);
        const lumB = getRelativeLuminance(colorB);
        return getContrastRatio(Math.max(lumA, lumB), Math.min(lumA, lumB));
      }

      function pickLogoColorForBackground(background) {
        const backgroundHsl = rgbToHsl(background);
        const isBgLight = getRelativeLuminance(background) > 0.45;
        const lightnessOptions = isBgLight ? [24, 30, 36, 42] : [58, 64, 70];
        const candidates = [];

        for (const offset of [40, 80, 120, 160, 200, 240, 280, 320]) {
          for (const saturation of [90, 100]) {
            for (const lightness of lightnessOptions) {
              const hue = (backgroundHsl.h + offset + 360) % 360;
              const candidateHsl = { h: hue, s: saturation, l: lightness };
              const candidateRgb = hslToRgb(candidateHsl);
              candidates.push({ css: `hsl(${Math.round(hue)} ${saturation}% ${lightness}%)`, contrast: getContrastFromRgb(background, candidateRgb) });
            }
          }
        }

        const accessible = candidates.filter((entry) => entry.contrast >= 3.2);
        return accessible.length > 0 ? accessible[Math.floor(Math.random() * accessible.length)].css : '#ffffff';
      }

      function applyAccessibleRandomBackground() {
        const background = randomRgbColor();
        const bgLuminance = getRelativeLuminance(background);
        const contrastWithBlack = getContrastRatio(Math.max(bgLuminance, 0), Math.min(bgLuminance, 0));
        const contrastWithWhite = getContrastRatio(Math.max(bgLuminance, 1), Math.min(bgLuminance, 1));
        const textColor = contrastWithBlack >= contrastWithWhite ? '#000000' : '#ffffff';
        const bgCss = `rgb(${background.r} ${background.g} ${background.b})`;
        const logoColor = pickLogoColorForBackground(background);

        document.documentElement.style.setProperty('--page-bg', bgCss);
        document.documentElement.style.setProperty('--page-text', textColor);
        document.documentElement.style.setProperty('--logo-color', logoColor);

        try {
          window.localStorage.setItem('froellerTheme', JSON.stringify({ pageBg: bgCss, pageText: textColor, logoColor }));
        } catch (error) {
          console.debug('Theme persistence unavailable', error);
        }
      }

      function setSlideTarget() {
        const brandRow = document.getElementById('brandRow');
        const logo = document.querySelector('.logo');
        const wordmark = document.getElementById('wordmark');
        if (!brandRow || !logo || !wordmark) return;

        const wordmarkWidth = wordmark.getBoundingClientRect().width;
        const logoWidth = logo.getBoundingClientRect().width;
        const offset = -Math.max(0, (wordmarkWidth - logoWidth) / 2);
        document.documentElement.style.setProperty('--move-left', `${Math.round(offset)}px`);
      }

      function resolvePageUrl(fileName) {
        const currentUrl = window.location.href;
        if (currentUrl.includes('htmlpreview.github.io/?https://raw.githubusercontent.com/')) {
          const [previewBase, rawSource] = currentUrl.split('?');
          const nextRaw = rawSource.replace(/\/[^/]*$/, `/${fileName}`);
          return `${previewBase}?${nextRaw}`;
        }
        return fileName;
      }

      function enableLogoDialInteraction() {
        const logo = document.querySelector('.logo');
        if (!logo) return;
        let activePointerId = null;
        let lastPointerAngle = 0;
        let currentRotation = 0;
        let springBackFrame = null;
        let springVelocity = 0;

        function normalizeAngle(degrees) {
          const normalized = (degrees + 360) % 360;
          return normalized > 180 ? normalized - 360 : normalized;
        }

        function angleFromPointer(event) {
          const bounds = logo.getBoundingClientRect();
          const centerX = bounds.left + bounds.width / 2;
          const centerY = bounds.top + bounds.height / 2;
          return Math.atan2(event.clientY - centerY, event.clientX - centerX) * (180 / Math.PI);
        }

        function setRotation(degrees) {
          currentRotation = degrees;
          logo.style.setProperty('--logo-rotation', `${degrees}deg`);
        }

        function animateBack() {
          if (Math.abs(currentRotation) < 0.15 && Math.abs(springVelocity) < 0.05) {
            setRotation(0);
            springBackFrame = null;
            return;
          }
          springVelocity += (0 - currentRotation) * 0.11;
          springVelocity *= 0.82;
          setRotation(currentRotation + springVelocity);
          springBackFrame = window.requestAnimationFrame(animateBack);
        }

        logo.addEventListener('pointerdown', (event) => {
          if (event.button !== 0) return;
          if (springBackFrame) { window.cancelAnimationFrame(springBackFrame); springBackFrame = null; }
          activePointerId = event.pointerId;
          logo.setPointerCapture(activePointerId);
          logo.classList.add('rotating');
          lastPointerAngle = angleFromPointer(event);
          springVelocity = 0;
          event.preventDefault();
        });

        logo.addEventListener('pointermove', (event) => {
          if (activePointerId !== event.pointerId) return;
          const pointerAngle = angleFromPointer(event);
          const delta = normalizeAngle(pointerAngle - lastPointerAngle);
          lastPointerAngle = pointerAngle;
          setRotation(Math.max(-160, Math.min(160, currentRotation + delta)));
        });

        function releasePointer(event) {
          if (activePointerId !== event.pointerId) return;
          logo.classList.remove('rotating');
          logo.releasePointerCapture(activePointerId);
          activePointerId = null;
          if (!springBackFrame) springBackFrame = window.requestAnimationFrame(animateBack);
        }

        logo.addEventListener('pointerup', releasePointer);
        logo.addEventListener('pointercancel', releasePointer);
      }

      applyAccessibleRandomBackground();
      setSlideTarget();
      enableLogoDialInteraction();

      const yearNode = document.getElementById('copyrightYear');
      if (yearNode) yearNode.textContent = String(new Date().getFullYear());

      const loginButton = document.getElementById('loginButton');
      if (loginButton) {
        loginButton.addEventListener('click', () => {
          window.location.href = resolvePageUrl('notes.html');
        });
      }

      window.addEventListener('resize', setSlideTarget);
    })();
  </script>
</body>
</html>
