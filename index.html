<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>froeller.com</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <meta name="description" content="Animierter Einstieg mit Logo, Schriftzug und Login.">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="referrer" content="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,500;0,700;1,500;1,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #efefef;
      --page-text: #111111;
      --logo-color: #ffffff;
      --logo-size: clamp(116px, 14vmin, 176px);
      --gap: clamp(14px, 2.2vmin, 24px);
      --font-family: 'Plus Jakarta Sans', 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --move-left: clamp(-92px, -9.5vw, -128px);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      font-family: var(--font-family);
    }

    body {
      display: grid;
      place-items: center;
      color: var(--logo-color);
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(26px, 4.2vmin, 40px);
      width: min(90vw, 980px);
    }

    .brand-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--gap);
      transform: translateX(0);
      animation: slideToLeft 1350ms cubic-bezier(0.2, 0.85, 0.2, 1) 2300ms forwards;
      will-change: transform;
    }

    .logo {
      width: var(--logo-size);
      aspect-ratio: 1 / 1;
      background: var(--logo-color);
      opacity: 0;
      animation: logoFadeIn 2200ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
      -webkit-mask-image: url('logo.svg');
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      mask-image: url('logo.svg');
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
      flex: 0 0 auto;
    }

    .wordmark {
      margin: 0;
      min-height: 1em;
      font-size: clamp(2.15rem, 5.2vmin, 4.9rem);
      font-weight: 800;
      font-style: italic;
      letter-spacing: -0.045em;
      line-height: 0.9;
      color: var(--logo-color);
      white-space: nowrap;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(10px);
      animation: charIn 420ms cubic-bezier(0.2, 0.95, 0.3, 1) forwards;
      animation-delay: calc(2480ms + (var(--i) * 88ms));
    }

    .login-button {
      border: 1.5px solid color-mix(in oklab, var(--logo-color) 70%, transparent);
      border-radius: 999px;
      padding: 0.78rem 2rem;
      font: italic 600 clamp(0.96rem, 1.7vmin, 1.1rem) / 1 var(--font-family);
      letter-spacing: -0.01em;
      background: color-mix(in oklab, var(--logo-color) 10%, transparent);
      color: var(--logo-color);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.18);
      opacity: 0;
      transform: translateY(16px) scale(0.97);
      pointer-events: none;
      cursor: pointer;
      animation: buttonEnter 700ms cubic-bezier(0.16, 1, 0.3, 1) 4050ms forwards;
    }

    .login-button:focus-visible {
      outline: 3px solid color-mix(in oklab, var(--logo-color) 70%, white);
      outline-offset: 3px;
    }

    .site-footer {
      position: fixed;
      left: 50%;
      bottom: clamp(12px, 2.2vmin, 24px);
      transform: translateX(-50%);
      margin: 0;
      color: color-mix(in oklab, var(--logo-color) 78%, transparent);
      font-size: clamp(0.82rem, 1.4vmin, 1rem);
      font-style: italic;
      letter-spacing: -0.01em;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes logoFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideToLeft {
      from { transform: translateX(0); }
      to { transform: translateX(var(--move-left)); }
    }

    @keyframes charIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes buttonEnter {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }
    }

    @media (max-width: 720px) {
      :root {
        --move-left: clamp(-56px, -9vw, -88px);
      }

      .wordmark { font-size: clamp(1.72rem, 11.2vw, 3rem); }
      .logo { width: clamp(88px, 28vw, 126px); }
      .brand-row { gap: clamp(10px, 3vw, 18px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo,
      .brand-row,
      .char,
      .login-button {
        animation: none;
        opacity: 1;
        transform: none;
      }

      .login-button { pointer-events: auto; }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Logo und Einstieg">
    <div class="brand-row">
      <div class="logo" role="img" aria-label="froeller.com Logo"></div>
      <h1 class="wordmark" id="wordmark" aria-label="froeller.com"></h1>
    </div>
    <button class="login-button" id="loginButton" type="button">Login</button>
  </main>

  <p class="site-footer">© <span id="copyrightYear"></span> Patrick Fröller. All rights reserved.</p>

  <script>
    (() => {
      function srgbToLinear(value) {
        const normalized = value / 255;
        return normalized <= 0.04045
          ? normalized / 12.92
          : Math.pow((normalized + 0.055) / 1.055, 2.4);
      }

      function getRelativeLuminance({ r, g, b }) {
        const red = srgbToLinear(r);
        const green = srgbToLinear(g);
        const blue = srgbToLinear(b);
        return red * 0.2126 + green * 0.7152 + blue * 0.0722;
      }

      function getContrastRatio(lighter, darker) {
        return (lighter + 0.05) / (darker + 0.05);
      }

      function randomRgbColor() {
        return {
          r: Math.floor(Math.random() * 256),
          g: Math.floor(Math.random() * 256),
          b: Math.floor(Math.random() * 256)
        };
      }

      function rgbToHsl({ r, g, b }) {
        const red = r / 255;
        const green = g / 255;
        const blue = b / 255;
        const max = Math.max(red, green, blue);
        const min = Math.min(red, green, blue);
        const delta = max - min;

        let hue = 0;
        if (delta !== 0) {
          if (max === red) {
            hue = ((green - blue) / delta) % 6;
          } else if (max === green) {
            hue = (blue - red) / delta + 2;
          } else {
            hue = (red - green) / delta + 4;
          }
        }

        const lightness = (max + min) / 2;
        const saturation = delta === 0
          ? 0
          : delta / (1 - Math.abs(2 * lightness - 1));

        return {
          h: ((hue * 60) + 360) % 360,
          s: saturation * 100,
          l: lightness * 100
        };
      }

      function hslToRgb({ h, s, l }) {
        const saturation = s / 100;
        const lightness = l / 100;
        const chroma = (1 - Math.abs(2 * lightness - 1)) * saturation;
        const hueSection = h / 60;
        const x = chroma * (1 - Math.abs((hueSection % 2) - 1));

        let red = 0;
        let green = 0;
        let blue = 0;

        if (hueSection >= 0 && hueSection < 1) {
          red = chroma; green = x; blue = 0;
        } else if (hueSection >= 1 && hueSection < 2) {
          red = x; green = chroma; blue = 0;
        } else if (hueSection >= 2 && hueSection < 3) {
          red = 0; green = chroma; blue = x;
        } else if (hueSection >= 3 && hueSection < 4) {
          red = 0; green = x; blue = chroma;
        } else if (hueSection >= 4 && hueSection < 5) {
          red = x; green = 0; blue = chroma;
        } else {
          red = chroma; green = 0; blue = x;
        }

        const match = lightness - chroma / 2;
        return {
          r: Math.round((red + match) * 255),
          g: Math.round((green + match) * 255),
          b: Math.round((blue + match) * 255)
        };
      }

      function getContrastFromRgb(colorA, colorB) {
        const lumA = getRelativeLuminance(colorA);
        const lumB = getRelativeLuminance(colorB);
        return getContrastRatio(Math.max(lumA, lumB), Math.min(lumA, lumB));
      }

      function pickLogoColorForBackground(background) {
        const backgroundHsl = rgbToHsl(background);
        const isBgLight = getRelativeLuminance(background) > 0.45;
        const hueOffsets = [30, 60, 90, 120, 150, 180, 210, 240, 300, 330];
        const saturationOptions = [95, 100];
        const lightnessOptions = isBgLight
          ? [22, 28, 34, 40, 46]
          : [56, 62, 68, 74];

        const candidates = [];
        for (const offset of hueOffsets) {
          for (const saturation of saturationOptions) {
            for (const lightness of lightnessOptions) {
              const hue = (backgroundHsl.h + offset + Math.random() * 24 - 12 + 360) % 360;
              const candidateHsl = { h: hue, s: saturation, l: lightness };
              const candidateRgb = hslToRgb(candidateHsl);
              candidates.push({
                css: `hsl(${Math.round(candidateHsl.h)} ${candidateHsl.s}% ${candidateHsl.l}%)`,
                contrast: getContrastFromRgb(background, candidateRgb),
                vividness: candidateHsl.s * (100 - Math.abs(candidateHsl.l - 50))
              });
            }
          }
        }

        candidates.sort((a, b) => {
          if (b.contrast !== a.contrast) {
            return b.contrast - a.contrast;
          }
          return b.vividness - a.vividness;
        });

        const strongVividMatches = candidates.filter((entry) => entry.contrast >= 3.5);
        if (strongVividMatches.length > 0) {
          return strongVividMatches[Math.floor(Math.random() * strongVividMatches.length)].css;
        }

        const fallbackVividMatches = candidates.filter((entry) => entry.contrast >= 3);
        if (fallbackVividMatches.length > 0) {
          return fallbackVividMatches[Math.floor(Math.random() * fallbackVividMatches.length)].css;
        }

        return getContrastFromRgb(background, { r: 255, g: 255, b: 255 }) >= 4.5
          ? '#ffffff'
          : '#000000';
      }

      function applyAccessibleRandomBackground() {
        const background = randomRgbColor();
        const bgLuminance = getRelativeLuminance(background);

        const blackLuminance = 0;
        const whiteLuminance = 1;
        const contrastWithBlack = getContrastRatio(
          Math.max(bgLuminance, blackLuminance),
          Math.min(bgLuminance, blackLuminance)
        );
        const contrastWithWhite = getContrastRatio(
          Math.max(bgLuminance, whiteLuminance),
          Math.min(bgLuminance, whiteLuminance)
        );

        const textColor = contrastWithBlack >= contrastWithWhite ? '#000000' : '#ffffff';
        const bgCss = `rgb(${background.r} ${background.g} ${background.b})`;

        document.documentElement.style.setProperty('--page-bg', bgCss);
        document.documentElement.style.setProperty('--page-text', textColor);
        document.documentElement.style.setProperty('--logo-color', pickLogoColorForBackground(background));
      }

      function renderWordmark() {
        const wordmark = document.getElementById('wordmark');
        if (!wordmark) {
          return;
        }

        const text = 'froeller.com';
        wordmark.textContent = '';

        [...text].forEach((character, index) => {
          const span = document.createElement('span');
          span.className = 'char';
          span.style.setProperty('--i', String(index));
          span.textContent = character;
          wordmark.appendChild(span);
        });
      }

      applyAccessibleRandomBackground();
      renderWordmark();

      const yearNode = document.getElementById('copyrightYear');
      if (yearNode) {
        yearNode.textContent = String(new Date().getFullYear());
      }

      const loginButton = document.getElementById('loginButton');
      if (loginButton) {
        loginButton.addEventListener('click', () => {
          window.location.href = 'notepad.html';
        });
      }
    })();
  </script>
</body>
</html>
