<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>froeller.com — Notes</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="referrer" content="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #efefef;
      --panel: color-mix(in oklab, #ffffff 96%, #efefef);
      --text: #111111;
      --muted: color-mix(in oklab, var(--text) 65%, transparent);
      --accent: #ffffff;
      --font-family: 'Nunito Sans', 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-family);
    }

    body {
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 32px);
    }

    .notes {
      width: min(960px, 100%);
      height: min(700px, 100%);
      background: var(--panel);
      border: 1px solid color-mix(in oklab, var(--text) 16%, transparent);
      border-radius: 22px;
      box-shadow: 0 20px 80px color-mix(in oklab, var(--text) 24%, transparent);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid color-mix(in oklab, var(--text) 12%, transparent);
      background: color-mix(in oklab, var(--panel) 86%, var(--bg));
    }

    .toolbar h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .button {
      border: 1px solid color-mix(in oklab, var(--text) 22%, transparent);
      border-radius: 999px;
      background: color-mix(in oklab, var(--panel) 40%, var(--bg));
      color: var(--text);
      font: 700 0.9rem/1 var(--font-family);
      letter-spacing: -0.01em;
      padding: 0.58rem 1rem;
      cursor: pointer;
      text-decoration: none;
    }

    .button.save {
      border-color: color-mix(in oklab, var(--accent) 65%, var(--text));
      background: color-mix(in oklab, var(--accent) 18%, transparent);
    }

    .status {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
      min-width: 9ch;
      text-align: right;
    }

    .gate,
    .editor {
      height: 100%;
      width: 100%;
    }

    .gate {
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 28px);
    }

    .gate-card {
      width: min(460px, 100%);
      display: grid;
      gap: 12px;
    }

    .gate-title {
      margin: 0;
      font-size: clamp(1.2rem, 2.8vw, 1.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .gate-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .gate-input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid color-mix(in oklab, var(--text) 18%, transparent);
      background: color-mix(in oklab, var(--panel) 86%, white);
      color: var(--text);
      font: 600 1rem/1.2 var(--font-family);
      padding: 0.78rem 0.95rem;
      outline: none;
    }

    .gate-input:focus-visible {
      border-color: color-mix(in oklab, var(--accent) 52%, var(--text));
      box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 24%, transparent);
    }

    .gate-error {
      min-height: 1.2em;
      margin: 0;
      color: #b91c1c;
      font-size: 0.9rem;
    }

    .editor {
      display: none;
      grid-template-rows: 1fr;
    }

    .editor.is-unlocked {
      display: grid;
    }

    textarea {
      width: 100%;
      height: 100%;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: 600 1.02rem/1.6 var(--font-family);
      padding: clamp(16px, 2.8vw, 28px);
      caret-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="notes" aria-label="Notes">
    <header class="toolbar">
      <h1>froeller.com Notes</h1>
      <div class="toolbar-actions">
        <button class="button save" id="saveButton" type="button" disabled>Save</button>
        <a class="button" href="index.html" id="backLink">Back</a>
        <p class="status" id="status" aria-live="polite">Locked</p>
      </div>
    </header>

    <section class="gate" id="gate">
      <form class="gate-card" id="gateForm">
        <h2 class="gate-title">Enter password</h2>
        <p class="gate-subtitle">Use your password to decrypt and open your notes.</p>
        <input class="gate-input" id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" required>
        <button class="button save" type="submit">Unlock Notes</button>
        <p class="gate-error" id="gateError" aria-live="polite"></p>
      </form>
    </section>

    <section class="editor" id="editor">
      <textarea id="notesText" placeholder="Write your notes here..."></textarea>
    </section>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = 'froellerSecureNotes.v1';
      const TEXT_ENCODER = new TextEncoder();
      const TEXT_DECODER = new TextDecoder();

      const gateForm = document.getElementById('gateForm');
      const backLink = document.getElementById('backLink');
      const passwordInput = document.getElementById('passwordInput');
      const gateError = document.getElementById('gateError');
      const gate = document.getElementById('gate');
      const editor = document.getElementById('editor');
      const notesText = document.getElementById('notesText');
      const saveButton = document.getElementById('saveButton');
      const status = document.getElementById('status');

      if (!gateForm || !passwordInput || !gateError || !gate || !editor || !backLink || !notesText || !saveButton || !status) {
        return;
      }

      let unlockedPassword = '';
      let autosaveTimer = null;

      function resolvePageUrl(fileName) {
        const currentUrl = window.location.href;
        if (currentUrl.includes('htmlpreview.github.io/?https://raw.githubusercontent.com/')) {
          const [previewBase, rawSource] = currentUrl.split('?');
          const nextRaw = rawSource.replace(/\/[^/]*$/, `/${fileName}`);
          return `${previewBase}?${nextRaw}`;
        }
        return fileName;
      }

      function applyStoredTheme() {
        try {
          const raw = window.localStorage.getItem('froellerTheme');
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object') return;

          if (parsed.pageBg) {
            document.documentElement.style.setProperty('--bg', parsed.pageBg);
          }
          if (parsed.pageText) {
            document.documentElement.style.setProperty('--text', parsed.pageText);
            const muted = parsed.pageText === '#000000' ? '#334155' : '#e5e7eb';
            document.documentElement.style.setProperty('--muted', muted);
          }
          if (parsed.logoColor) {
            document.documentElement.style.setProperty('--accent', parsed.logoColor);
          }
          document.documentElement.style.setProperty('--panel', 'color-mix(in oklab, #ffffff 88%, var(--bg))');
        } catch (error) {
          console.debug('Theme load unavailable', error);
        }
      }

      function toBase64(bytes) {
        return window.btoa(String.fromCharCode(...new Uint8Array(bytes)));
      }

      function fromBase64(value) {
        const ascii = window.atob(value);
        return Uint8Array.from(ascii, (char) => char.charCodeAt(0));
      }

      async function deriveKey(password, saltBytes) {
        const keyMaterial = await window.crypto.subtle.importKey(
          'raw',
          TEXT_ENCODER.encode(password),
          'PBKDF2',
          false,
          ['deriveKey']
        );

        return window.crypto.subtle.deriveKey(
          {
            name: 'PBKDF2',
            salt: saltBytes,
            iterations: 250000,
            hash: 'SHA-256'
          },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['encrypt', 'decrypt']
        );
      }

      async function encryptText(plainText, password) {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(password, salt);
        const cipherBuffer = await window.crypto.subtle.encrypt(
          { name: 'AES-GCM', iv },
          key,
          TEXT_ENCODER.encode(plainText)
        );

        return {
          salt: toBase64(salt),
          iv: toBase64(iv),
          cipher: toBase64(new Uint8Array(cipherBuffer)),
          savedAt: new Date().toISOString()
        };
      }

      async function decryptPayload(payload, password) {
        const salt = fromBase64(payload.salt);
        const iv = fromBase64(payload.iv);
        const cipher = fromBase64(payload.cipher);
        const key = await deriveKey(password, salt);

        const plainBuffer = await window.crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          key,
          cipher
        );

        return TEXT_DECODER.decode(plainBuffer);
      }

      function loadEncryptedPayload() {
        try {
          const raw = window.localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          return null;
        }
      }

      async function saveNow() {
        if (!unlockedPassword) {
          status.textContent = 'Locked';
          return;
        }

        status.textContent = 'Saving...';

        try {
          const payload = await encryptText(notesText.value, unlockedPassword);
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
          status.textContent = `Saved ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        } catch (error) {
          status.textContent = 'Save failed';
          console.error(error);
        }
      }

      function queueAutosave() {
        if (!unlockedPassword) {
          return;
        }

        status.textContent = 'Unsaved changes';
        if (autosaveTimer) {
          window.clearTimeout(autosaveTimer);
        }

        autosaveTimer = window.setTimeout(() => {
          saveNow();
        }, 700);
      }

      async function unlock(password) {
        const existingPayload = loadEncryptedPayload();
        if (!existingPayload) {
          unlockedPassword = password;
          notesText.value = '';
          return;
        }

        const plainText = await decryptPayload(existingPayload, password);
        unlockedPassword = password;
        notesText.value = plainText;
      }

      applyStoredTheme();
      backLink.href = resolvePageUrl('index.html');

      gateForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        gateError.textContent = '';

        try {
          await unlock(passwordInput.value);
          gate.style.display = 'none';
          editor.classList.add('is-unlocked');
          saveButton.disabled = false;
          status.textContent = 'Unlocked';
          notesText.focus();
        } catch (error) {
          gateError.textContent = 'Wrong password or corrupted encrypted data.';
        }
      });

      saveButton.addEventListener('click', () => {
        saveNow();
      });

      notesText.addEventListener('input', () => {
        queueAutosave();
      });
    })();
  </script>
</body>
</html>
